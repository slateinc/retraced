apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retraced.fullname" . }}-processor
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  replicas: {{ .Values.processor.replicaCount }}
  selector:
    matchLabels:
      {{- include "retraced.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      labels:
        {{- include "retraced.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: processor
    spec:
      serviceAccountName: {{ include "retraced.serviceAccountName" . }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 2
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "retraced.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: processor
      containers:
        - name: processor
          image: {{ .Values.processor.image.repository }}:{{ .Values.processor.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.processor.image.pullPolicy }}
          command:
            - node
            - build/src/_processor/index.js
          env:
            - name: TMPDIR
              value: {{ quote .Values.processor.env.tmpdir }}
            - name: BUGSNAG_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "retraced.auditlogSecretName" . }}
                  key: PROCESSOR_TOKEN
            - name: PG_SEARCH
              value: {{ quote .Values.processor.env.pgSearch }}
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
          envFrom:
            - secretRef:
                name: {{ include "retraced.auditlogSecretName" . }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 5
            periodSeconds: 30
            successThreshold: 2
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            failureThreshold: 5
            periodSeconds: 60
          resources: {{- toYaml .Values.processor.resources | nindent 12 }}
          volumeMounts:
            - name: tmpdir
              mountPath: /tmp
      volumes:
        - name: tmpdir
          emptyDir: {}
