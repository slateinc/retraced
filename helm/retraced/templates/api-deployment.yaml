apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retraced.fullname" . }}-api
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "retraced.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        {{- include "retraced.checksumAnnotations" . | nindent 8 }}
        checksum/bootstrap-secret: {{ include (print $.Template.BasePath "/bootstrap-secret.yaml") . | sha256sum }}
      labels:
        {{- include "retraced.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "retraced.serviceAccountName" . }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "retraced.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: api
      initContainers:
        - name: bootstrap
          image: {{ include "retraced.image" (dict "image" .Values.bootstrap.image "global" .Values.global "default" .Chart.AppVersion) }}
          command:
            - /bin/sh
          args: {{- toYaml .Values.bootstrap.args | nindent 12 }}
          envFrom:
            {{- include "retraced.envFrom" . | nindent 12 }}
            {{- if .Values.bootstrap.credentials.createSecret }}
            - secretRef:
                name: {{ include "retraced.bootstrapSecretName" . }}
            {{- end }}
          env:
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources: {}
      containers:
        - name: api
          image: {{ include "retraced.image" (dict "image" .Values.api.image "global" .Values.global "default" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - node
            - build/src/index.js
          envFrom: {{- include "retraced.envFrom" . | nindent 12 }}
          env:
            - name: EXPORT_PAGE_SIZE_INTERNAL
              value: {{ quote .Values.api.env.exportPageSizeInternal }}
            - name: PG_SEARCH
              value: {{ if not .Values.elasticsearch.enabled }}"TRUE"{{ else }}""{{ end }}
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 5
            periodSeconds: 30
            successThreshold: 2
            timeoutSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
