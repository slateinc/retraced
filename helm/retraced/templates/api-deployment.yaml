apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retraced.fullname" . }}-api
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "retraced.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "retraced.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "retraced.serviceAccountName" . }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "retraced.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: api
      initContainers:
        - name: bootstrap
          image: {{ .Values.api.bootstrap.image.repository }}:{{ .Values.api.bootstrap.image.tag | default .Chart.AppVersion }}
          command:
            - /bin/sh
          args: {{- toYaml .Values.api.bootstrap.args | nindent 12 }}
          env:
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
          envFrom:
            - secretRef:
                name: {{ include "retraced.auditlogSecretName" . }}
            - secretRef:
                name: {{ include "retraced.bootstrapSecretName" . }}
          resources: {}
      containers:
        - name: api
          image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - node
            - build/src/index.js
          env:
            - name: BUGSNAG_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "retraced.auditlogSecretName" . }}
                  key: API_TOKEN
            - name: EXPORT_PAGE_SIZE_INTERNAL
              value: {{ quote .Values.api.env.exportPageSizeInternal }}
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
          envFrom:
            - secretRef:
                name: {{ include "retraced.auditlogSecretName" . }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 5
            periodSeconds: 10
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 5
            periodSeconds: 30
            successThreshold: 2
            timeoutSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
