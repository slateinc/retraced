apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retraced.fullname" . }}-dbutil
  labels:
    app: retraced
    retraceddev: "1"
    tier: dbutil
  {{- include "retraced.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dbutil.replicas }}
  selector:
    matchLabels:
      app: retraced
      retraceddev: "1"
      tier: dbutil
    {{- include "retraced.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: retraced
        retraceddev: "1"
        tier: dbutil
      {{- include "retraced.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - command:
        - /bin/sleep
        - infinity
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        envFrom:
        - secretRef:
            name: {{ include "retraced.auditlogSecretName" . }}
        image: {{ .Values.dbutil.dbutil.image.repository }}:{{ .Values.dbutil.dbutil.image.tag
          | default .Chart.AppVersion }}
        name: dbutil
        resources: {}
