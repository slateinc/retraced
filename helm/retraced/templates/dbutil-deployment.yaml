apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retraced.fullname" . }}-dbutil
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: dbutil
spec:
  replicas: {{ .Values.dbutil.replicas }}
  selector:
    matchLabels:
      {{- include "retraced.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dbutil
  template:
    metadata:
      labels:
        {{- include "retraced.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dbutil
    spec:
      serviceAccountName: {{ include "retraced.serviceAccountName" . }}
      containers:
        - name: dbutil
          image: {{ include "retraced.image" (dict "image" .Values.dbutil.image "global" .Values.global "default" .Chart.AppVersion) }}
          command:
            - /bin/sleep
            - infinity
          envFrom: {{- include "retraced.envFrom" . | nindent 12 }}
          env:
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources: {}
