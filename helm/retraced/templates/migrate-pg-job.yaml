apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "retraced.fullname" . }}-migrate-pg
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate-pg
spec:
  ttlSecondsAfterFinished: 0
  template:
    metadata:
      labels:
        {{- include "retraced.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate-pg
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "retraced.serviceAccountName" . }}
      containers:
        - name: db
          image: {{ .Values.migratePg.image.repository }}:{{ .Values.migratePg.image.tag | default .Chart.AppVersion }}
          command:
            - node
            - build/src/_db/runner-lite.js
            - pg
          env:
            - name: BUGSNAG_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "retraced.auditlogSecretName" . }}
                  key: DB_TOKEN
            - name: SCHEMA_PATH
              value: {{ quote .Values.migratePg.env.schemaPath }}
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
          envFrom:
            - secretRef:
                name: {{ include "retraced.auditlogSecretName" . }}
          resources: {}
