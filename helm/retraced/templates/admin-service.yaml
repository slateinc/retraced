{{- if .Values.admin.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "retraced.fullname" . }}-admin
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: {{ .Values.admin.service.type }}
  ports:
    - name: http
      port: {{ .Values.admin.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "retraced.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: admin
{{- end }}
