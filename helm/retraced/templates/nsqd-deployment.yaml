apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retraced.fullname" . }}-nsqd
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: nsqd
spec:
  replicas: {{ .Values.nsqd.replicaCount }}
  selector:
    matchLabels:
      {{- include "retraced.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nsqd
  template:
    metadata:
      labels:
        {{- include "retraced.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nsqd
    spec:
      serviceAccountName: {{ include "retraced.serviceAccountName" . }}
      containers:
        - name: nsqd
          image: {{ include "retraced.image" (dict "image" .Values.nsqd.image "global" .Values.global "default" .Chart.AppVersion) }}
          command:
            - /bin/sh
          args: {{- toYaml .Values.nsqd.args | nindent 12 }}
          envFrom: {{- include "retraced.envFrom" . | nindent 12 }}
          env:
            - name: KUBERNETES_CLUSTER_DOMAIN
              value: {{ quote .Values.kubernetesClusterDomain }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: tcp
              containerPort: 4150
              protocol: TCP
            - name: http
              containerPort: 4151
              protocol: TCP
          resources: {{- toYaml .Values.nsqd.resources | nindent 12 }}
