{{- if .Values.credentials.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "retraced.fullname" . }}-credentials
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: credentials
stringData:
  ADMIN_ROOT_TOKEN: {{ .Values.credentials.adminRootToken | quote }}
  API_TOKEN: {{ .Values.credentials.apiToken | quote }}
  DB_TOKEN: {{ .Values.credentials.dbToken | quote }}
  ELASTICSEARCH_NODES: {{ .Values.credentials.elasticsearchNodes | quote }}
  GEOIPUPDATE_ACCOUNT_ID: {{ .Values.credentials.geoipupdateAccountId | quote }}
  GEOIPUPDATE_LICENSE_KEY: {{ .Values.credentials.geoipupdateLicenseKey | quote }}
  HMAC_SECRET_ADMIN: {{ .Values.credentials.hmacSecretAdmin | quote }}
  HMAC_SECRET_VIEWER: {{ .Values.credentials.hmacSecretViewer | quote }}
  MANDRILL_KEY: {{ .Values.credentials.mandrillKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.credentials.postgresPassword | quote }}
  PROCESSOR_TOKEN: {{ .Values.credentials.processorToken | quote }}
{{- end }}
