{{- if .Values.bootstrap.credentials.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "retraced.bootstrapSecretName" . }}
  labels:
    {{- include "retraced.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap-secret
stringData:
  BOOTSTRAP_API_TOKEN: {{ required "bootstrap.credentials.apiToken is required" .Values.bootstrap.credentials.apiToken | quote }}
{{- end }}
