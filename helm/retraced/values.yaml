# -- String to partially override the chart name
nameOverride: ""
# -- String to fully override the release name used for resource names
fullnameOverride: ""

# -- Kubernetes cluster domain
kubernetesClusterDomain: cluster.local

serviceAccount:
  # -- Create a service account for the application pods
  create: true
  # -- Name of the service account. Defaults to the fullname if empty.
  name: ""
  # -- Annotations to add to the service account (e.g. for IRSA)
  annotations: {}

# -- Auditlog secret configuration.
# Set existingSecret to use a pre-existing secret and skip creation.
auditlog:
  # -- Name of an existing secret containing all required auditlog keys.
  # When set, the chart will not create a secret and will reference this instead.
  existingSecret: ""
  adminRootToken: "dev"
  apiBaseUrlPath: "/auditlog"
  apiToken: ""
  dbToken: ""
  elasticsearchNodes: "http://user:password@retraced-elasticsearch:9200"
  geoipupdateAccountId: ""
  geoipupdateDbDir: "/etc/mmdb"
  geoipupdateEditionIds: "GeoLite2-City"
  geoipupdateFrequency: "168"
  geoipupdateLicenseKey: ""
  geoipupdateUseMmdb: ""
  geoipupdateVerbose: "1"
  hmacSecretAdmin: "xxxxxxx"
  hmacSecretViewer: "xxxxxxxxx"
  logLevel: "info"
  mandrillKey: ""
  nsqdHost: "retraced-nsqd"
  nsqdHttpPort: "4151"
  nsqdTcpPort: "4150"
  postgresDatabase: "retraced"
  postgresHost: "retraced-postgres"
  postgresPassword: "password"
  postgresPoolSize: "10"
  postgresPort: "5434"
  postgresUser: "retraced"
  processorToken: ""
  retracedApiBase: "http://localhost:3000/auditlog"
  retracedDisableGeosync: ""
  stage: ""
  statsdHost: ""
  statsdPort: ""

# -- Bootstrap secret configuration.
# Set existingSecret to use a pre-existing secret and skip creation.
bootstrap:
  # -- Name of an existing secret containing all required bootstrap keys.
  # When set, the chart will not create a secret and will reference this instead.
  existingSecret: ""
  bootstrapApiToken: "dev"
  bootstrapEnvironmentId: "dev"
  bootstrapProjectId: "dev"
  bootstrapProjectName: "dev"

elasticsearch:
  # -- Set to false to skip the Elasticsearch migration job (e.g. when using PG_SEARCH mode)
  enabled: true

# -- API server deployment configuration
api:
  replicaCount: 1
  image:
    repository: retracedhq/retraced
    tag: "1.12.1"
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 3000
  internalService:
    type: ClusterIP
    port: 3000
  env:
    exportPageSizeInternal: "2"
  resources:
    limits:
      cpu: "1"
    requests:
      cpu: 100m
  # -- Bootstrap init container configuration
  bootstrap:
    args:
      - -c
      - ./build/src/retracedctl bootstrap --projectName   "$BOOTSTRAP_PROJECT_NAME"
        --projectId     "$BOOTSTRAP_PROJECT_ID" --environmentId "$BOOTSTRAP_ENVIRONMENT_ID"
        --apiKey        "$BOOTSTRAP_API_TOKEN"
    image:
      repository: retracedhq/retraced
      tag: "1.12.1"

# -- Processor deployment configuration
processor:
  replicaCount: 1
  image:
    repository: retracedhq/retraced
    tag: "1.12.1"
    pullPolicy: IfNotPresent
  env:
    pgSearch: ""
    tmpdir: /tmp
  resources:
    limits:
      cpu: "1"
    requests:
      cpu: 100m

# -- Cron deployment configuration
cron:
  replicaCount: 1
  image:
    repository: retracedhq/retraced
    tag: "1.12.1"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
    requests:
      cpu: 10m

# -- Database utility pod (maintenance/debug container that runs indefinitely)
dbutil:
  replicaCount: 1
  image:
    repository: retracedhq/retraced
    tag: "1.12.1"

# -- NSQ daemon configuration
nsqd:
  replicaCount: 1
  image:
    repository: nsqio/nsq
    tag: "v1.2.1"
  args:
    - -c
    - nsqd -statsd-address ${STATSD_HOST}:${STATSD_PORT} -statsd-prefix "nsqd."
  service:
    type: ClusterIP
    ports:
      - name: tcp
        port: 4150
        targetPort: 4150
      - name: http
        port: 4151
        targetPort: 4151
  resources:
    limits:
      cpu: "1"
    requests:
      cpu: 100m

# -- PostgreSQL migration job configuration
migratePg:
  image:
    repository: retracedhq/retraced
    tag: "1.12.1"
  env:
    schemaPath: /app/build/migrations/pg/*

# -- Elasticsearch migration job configuration
migrateEs:
  image:
    repository: retracedhq/retraced
    tag: "1.12.1"
  env:
    schemaPath: /app/build/migrations/es
